2974=有一个夜晚我烧毁了所有的记忆，从此我的梦就透明了；有一个早晨我扔掉了所有的昨天，从此我的脚步就轻盈了。《泰戈尔》
2975=那时我们有梦， 关于文学， 关于爱情， 关于穿越世界的旅行。 如今我们深夜饮酒，杯子碰到一起， 都是梦破碎的声音。 --- 北岛《波兰来客》
2976=努力想得到什么东西，其实只要沉着镇静、实事求是，就可以轻易地、神不知鬼不觉地达到目的。而如果过于使劲，闹得太凶，太幼稚，太没有经验，就哭啊，抓啊，拉啊，像一个小孩扯桌布，结果却是一无所获，只不过把桌上的好东西都扯到地上，永远也得不到了。《卡夫卡》
2977=一个人只有在痛苦之中才能明白什么是真正属于自己的……只有在破碎之中，人才能认识自己。《贝内迪克特·韦尔斯》
2978=不相信世界就是这样，在明知道有的时候必须低头，有的人必将失去，有的东西命中注定不能长久的时候，依然要说，在第一千个选择之外，还有第一千零一个可能，有一扇窗等着我打开，然后有光透进来。《王小波 ​​​​ ​​​​》
2979=我告诫自己：你的话说得太多，你听别人倾诉得太多，你喝咖啡喝得太多，你在陌生的房间里坐的时间太长，你的睡眠质量太差，你醒着的时间太长，你平庸的事想得太多，你希望过多，你安慰自己太频繁。《威廉·格纳齐诺》
298=在灾难面前，如果连英雄都逃跑了，那还有谁能站出来？《一拳超人》
2980=有多少人把性格交给星座，把努力交给鸡汤，把考试交给锦鲤，然后对自己说“听过很多道理，依然过不好这一生。 --- 艾力《你一年的8760小时》
2981=也许我爱的已不是你，而是对你付出的热情。就像一座神庙，即使荒芜，仍然是祭坛。一座雕像，即使坍塌，仍然是神。《莱蒙托夫》
2982=要逃避痛苦，最常见的，就是躲进未来。在时间的轨道上人们想象有一条线，超脱了这条线，当前的痛苦遍不复存在。 --- 米兰·昆德拉《不能承受的生命之轻》
2983=要快乐地面对一切挑战，哪怕恐惧渗入骨髓，因为就算我们是凡人，趁着还活在人世，就该绽放光彩。 --- 石黑一雄《被掩埋的巨人》
2984=目的虽有，却无路可循；我们称之为路的，无非是踌躇。 --- 卡夫卡《误入世界》
2985=去看生活，去看世界； 去目击伟大的历史事件； 去看穷人的面孔和骄傲者的姿态； 去看不同寻常的事物——机器、军队、群众、以及丛林中和月球上的阴影； 去看人类的杰作——绘画、建筑和发明； 去看千里之外的世界，去看隐藏在高墙和房间内的事物，以及难以接近的危险事件； 去看那些被男人所爱着的女人们还有孩子；去看并且享受愉悦； 去看并被感动； 去看并被教育……《《LIFE》创刊词》
2986=于千万人之中遇见你所要遇见的人，于千万年之中，时间的无涯的荒野里，没有早一步，也没有晚一步，刚巧赶上了，那也没有别的话可说，惟有轻轻地问一声：“噢，你也在这里吗？”。 --- 张爱玲《爱》
2987=我们就是梦幻所用的材料，一场睡梦环抱了短促的人生。《莎士比亚》
2988=少为纨绔子弟，极爱繁华，好精舍，好美婢，好娈童，好鲜衣，好美食，好骏马，好华灯，好烟火，好梨园，好鼓吹，好古董，好花鸟，兼以茶淫橘虐，书蠹诗魔，劳碌半生，皆成梦幻。年至五十，国破家亡，避迹山居。所存者，破床碎几，折鼎病琴，与残书数帙，缺砚一方而已。布衣疏莨，常至断炊。回首二十年前，真如隔世。 --- 张岱《自为墓志铭》
2989=一个人爱你的最高形式是/接得住你所有的负面情绪/因为说我爱你很容易 买一两次东西也很容易/接吻很容易/拥抱很容易/但在面对你一次又一次负面情绪的时候/不是不耐烦/也不是表面礼貌/是很难的/就像你皱眉的时候 我会觉得心疼/总觉得这个世界给你的不够 --- 吴子云《半句再见（歌曲）》
299=我不是因为需要你们评论几句才去当英雄的，而是因为我想去当所以我才当的。《一拳超人》
2990=他有属于他自己的孤独，所谓的心心相通， 都只是一场误会。 --- 卡森·麦卡勒斯《心是孤独的猎手》
